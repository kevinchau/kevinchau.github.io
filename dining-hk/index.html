    /* subtle card lift on hover (desktop only) */
    @media (hover: hover) {

    }
    /* focus ring honors keyboard-only */
    :focus-visible { outline: 3px solid rgb(245 158 11 / .7); outline-offset: 2px; border-radius: 6px; }
    /* tiny "copied!" toast */
    .toast {
      position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%);
      background: rgb(15 23 42); color: white; padding: 10px 18px; border-radius: 999px;
      font-size: 14px; font-weight: 500; box-shadow: 0 10px 30px -8px rgba(0,0,0,.4);
      opacity: 0; pointer-events: none; transition: opacity .2s ease, transform .2s ease;
      z-index: 50;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }
    /* picks bottom bar */
    #picks-bar {
      position: fixed; left: 0; right: 0; bottom: 0;
      background: rgb(15 23 42 / 0.92);
      color: white;

    function showToast(text) {
      toast.textContent = text;
      toast.classList.add('show');
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => toast.classList.remove('show'), 1600);
    }

    async function copyName(name) {
      try {
        await navigator.clipboard.writeText(name);
        showToast(t('toastCopied')(name));
      } catch (e) {
        // fallback for older / restrictive browsers
        const ta = document.createElement('textarea');
        ta.value = name; document.body.appendChild(ta); ta.select();
        try { document.execCommand('copy'); showToast(t('toastCopied')(name)); }
        catch { showToast(t('toastCopyFailed')); }
        document.body.removeChild(ta);
      }
    }

    function slugify(s) {
      return s.toLowerCase()

        .trim()
        .replace(/\s+/g, '-')
        .replace(/-+/g, '-');

    // Look up a translated field; falls back to the venue's English field if missing.
    function tv(v, field) {
      if (currentLang === 'en') return v[field];
      const tr = TRANSLATIONS[v.id];
      if (tr && tr[field]) return tr[field];
      return v[field];
    }

    // Lookup map for picks → venue row.
    const venueById = new Map();
    venues.forEach(v => venueById.set(v.id, { ...v, _kind: 'sit' }));
    dpdVenues.forEach(v => venueById.set(v.id, { ...v, _kind: 'dpd' }));

    function seatingBadgeLabel(seating) {
      if (seating === 'indoor') return t('seatingIndoor');
      if (seating === 'outdoor') return t('seatingOutdoor');
      if (seating === 'mixed') return t('seatingMixed');
      return '';
    }
    const SEATING_BADGE_CLASSES = {
      indoor:  'bg-sky-100 text-sky-800',
      outdoor: 'bg-amber-100 text-amber-800',
      mixed:   'bg-stone-200 text-stone-700',
    };

    function cardHtml(v) {
      const zh = v.zh ? `<p class="text-sm text-slate-500 mt-0.5">${escapeHtml(v.zh)}</p>` : '';
      const phone = v.phone ? `<span class="inline-flex items-center gap-1"><span aria-hidden="true">☎</span><a href="tel:${escapeHtml(v.phone.replace(/\s+/g,''))}" class="hover:text-amber-700 underline-offset-2 hover:underline">${escapeHtml(v.phone)}</a></span>` : '';
      const hoursStr = tv(v, 'hours');
      const hours = hoursStr ? `<p class="text-xs text-slate-500 mt-1 leading-snug"><span aria-hidden="true">🕒</span> ${escapeHtml(hoursStr)}</p>` : '';
      const seatingClasses = v.seating && SEATING_BADGE_CLASSES[v.seating];
      const seatingBadge = seatingClasses
        ? `<span class="text-xs px-2 py-0.5 rounded-full ${seatingClasses} font-medium">${escapeHtml(seatingBadgeLabel(v.seating))}</span>`
        : '';
      const dataSeating = v.seating ? ` data-seating="${escapeHtml(v.seating)}"` : '';
      const venueId = escapeHtml(v.id);
      // Copy-name button copies Chinese name when in zh mode and a zh name exists; else English.
      const copyTarget = (currentLang === 'zh' && v.zh) ? v.zh : v.name;
      return `
        <article class="card bg-white rounded-2xl border border-stone-200 p-5 flex flex-col gap-3 shadow-sm" data-venue-id="${venueId}"${dataSeating}>
          <header>
            <h2 class="text-lg sm:text-xl font-bold text-slate-900 leading-tight">${escapeHtml(v.name)}</h2>
            ${zh}
          </header>

          <div class="flex flex-wrap gap-1.5">
            <span class="text-xs px-2 py-0.5 rounded-full bg-amber-100 text-amber-900 font-medium">${escapeHtml(tv(v, 'cuisine'))}</span>
            <span class="text-xs px-2 py-0.5 rounded-full bg-stone-200 text-stone-800 font-medium">${escapeHtml(tv(v, 'hood'))}</span>
            <span class="text-xs px-2 py-0.5 rounded-full bg-stone-100 text-stone-700 font-medium">${escapeHtml(v.price)}</span>
            ${seatingBadge}
          </div>

          <p class="text-sm text-slate-700 italic leading-snug">${escapeHtml(tv(v, 'why'))}</p>

          <div class="text-xs text-slate-600 leading-relaxed flex flex-col gap-1 mt-1">
            <p><span aria-hidden="true">📍</span> ${escapeHtml(v.address)}</p>
            ${phone ? `<p>${phone}</p>` : ''}
            ${hours}
          </div>

          <div class="mt-auto pt-2 flex flex-col sm:flex-row gap-2">
            <a href="${escapeHtml(v.maps)}" target="_blank" rel="noopener noreferrer"
              class="flex-1 inline-flex items-center justify-center gap-1.5 bg-amber-500 hover:bg-amber-600 text-white font-semibold text-sm px-4 py-2.5 rounded-lg transition-colors">
              ${t('openMaps')}
            </a>
            <button type="button" data-copy="${escapeHtml(copyTarget)}"
              class="flex-1 inline-flex items-center justify-center gap-1.5 bg-slate-100 hover:bg-slate-200 text-slate-800 font-semibold text-sm px-4 py-2.5 rounded-lg transition-colors">
              ${t('copyName')}
            </button>
            <button type="button" data-pick="${venueId}" aria-pressed="false"
              class="pick-btn flex-1 inline-flex items-center justify-center gap-1.5 bg-emerald-50 hover:bg-emerald-100 text-emerald-800 border border-emerald-200 font-semibold text-sm px-4 py-2.5 rounded-lg transition-colors">
              <span class="pick-label">${t('pickButton')}</span>
            </button>
          </div>
        </article>
      `;
    }

    function attachCopyHandler(el) {
      el.addEventListener('click', (e) => {
        const btn = e.target.closest('[data-copy]');
        if (btn) copyName(btn.getAttribute('data-copy'));
      });
    }

    function renderStatic() {
      // Hero
      document.getElementById('hero-title').textContent = t('heroTitle');
      document.getElementById('hero-intro').innerHTML = t('heroIntroHtml');
      document.getElementById('hero-sub').textContent = t('heroSub');

      // Section headers
      document.getElementById('sitdown-header').textContent = t('sectionSitdown');
      document.getElementById('dpd-header').textContent = t('sectionDpd');
      document.getElementById('dpd-intro').textContent = t('dpdIntro');

      // Filter pills
      document.getElementById('dpd-filter-label').textContent = t('filterLabel');
      document.querySelector('.dpd-filter-btn[data-filter="all"]').textContent = t('filterAll');
      document.querySelector('.dpd-filter-btn[data-filter="indoor"]').textContent = t('filterIndoor');
      document.querySelector('.dpd-filter-btn[data-filter="outdoor"]').textContent = t('filterOutdoor');
      document.querySelector('.dpd-filter-btn[data-filter="mixed"]').textContent = t('filterMixed');

      // Area sub-headers
      document.getElementById('area-hki').textContent = t('areaHki');
      document.getElementById('area-klw').textContent = t('areaKlw');
      document.getElementById('area-nt').textContent = t('areaNt');

      // Footer
      document.getElementById('footer-note').innerHTML = t('footerNote');
      document.getElementById('footer-meta').textContent = t('footerMeta');

      // Picks bar buttons
      document.querySelector('.picks-copy-label').innerHTML = t('copyPicks');
      document.querySelector('.picks-clear-label').innerHTML = t('clearPicks');

      // <html lang> attribute for a11y / search engines
      document.documentElement.lang = currentLang === 'zh' ? 'zh-HK' : 'en';
    }

    function render() {
      grid.innerHTML = venues.map(cardHtml).join('');
      attachCopyHandler(grid);

      dpdGridHki.innerHTML = dpdVenues.filter(v => v.area === 'hki').map(cardHtml).join('');
      dpdGridKlw.innerHTML = dpdVenues.filter(v => v.area === 'klw').map(cardHtml).join('');
      dpdGridNt.innerHTML  = dpdVenues.filter(v => v.area === 'nt').map(cardHtml).join('');
      attachCopyHandler(dpdGridHki);
      attachCopyHandler(dpdGridKlw);
      attachCopyHandler(dpdGridNt);
    }

    function applyDpdFilter(filter) {
      const grids = [dpdGridHki, dpdGridKlw, dpdGridNt];
      grids.forEach(g => {
        g.querySelectorAll('article[data-seating]').forEach(card => {
          const match = filter === 'all' || card.dataset.seating === filter;
          card.classList.toggle('hidden', !match);
        });
      });
      document.querySelectorAll('.dpd-filter-btn').forEach(btn => {
        const isActive = btn.dataset.filter === filter;
        btn.classList.toggle('ring-2', isActive);
        btn.classList.toggle('ring-offset-2', isActive);
        btn.classList.toggle('ring-slate-800', isActive);
      });
    }

    let currentFilter = 'all';
    function wireDpdFilter() {
      const bar = document.getElementById('dpd-filter');
      if (!bar) return;
      bar.addEventListener('click', (e) => {
        const btn = e.target.closest('.dpd-filter-btn');
        if (!btn) return;
        currentFilter = btn.dataset.filter;
        applyDpdFilter(currentFilter);
      });
    }

    // ---------- Picks (client-side voting + clipboard export) ----------
    const PICKS_KEY = 'dining-hk:picks';
    const picksBar = document.getElementById('picks-bar');
    const picksBarSpacer = document.getElementById('picks-bar-spacer');
    const picksCountEl = document.getElementById('picks-count');
    const picksCopyBtn = document.getElementById('picks-copy');
    const picksClearBtn = document.getElementById('picks-clear');

    let picks = []; // ordered list of venue IDs

    function loadPicks() {
      try {
        const raw = localStorage.getItem(PICKS_KEY);
        if (!raw) return;
        const parsed = JSON.parse(raw);
        if (Array.isArray(parsed)) {
          picks = parsed.filter(id => typeof id === 'string' && venueById.has(id));
        }
      } catch { /* ignore corrupt JSON */ }
    }

    function persistPicks() {
      try { localStorage.setItem(PICKS_KEY, JSON.stringify(picks)); } catch {}
    }

    function syncPickButtons() {
      document.querySelectorAll('button[data-pick]').forEach(btn => {
        const id = btn.dataset.pick;
        const on = picks.includes(id);
        btn.setAttribute('aria-pressed', on ? 'true' : 'false');
        btn.classList.toggle('bg-emerald-50', !on);
        btn.classList.toggle('hover:bg-emerald-100', !on);
        btn.classList.toggle('text-emerald-800', !on);
        btn.classList.toggle('border-emerald-200', !on);
        btn.classList.toggle('bg-emerald-600', on);
        btn.classList.toggle('hover:bg-emerald-700', on);
        btn.classList.toggle('text-white', on);
        btn.classList.toggle('border-emerald-700', on);
        const label = btn.querySelector('.pick-label');
        if (label) label.innerHTML = on ? t('pickedButton') : t('pickButton');
      });
    }

    function renderBar() {
      const n = picks.length;
      picksCountEl.textContent = t('picksCount')(n);
      const visible = n > 0;
      picksBar.hidden = !visible;
      picksBarSpacer.hidden = !visible;
      picksCopyBtn.disabled = n === 0;
      picksCopyBtn.title = n === 0 ? t('pickAtLeastOne') : '';
    }

    function togglePick(id) {
      if (!venueById.has(id)) return;
      const i = picks.indexOf(id);
      if (i === -1) picks.push(id); else picks.splice(i, 1);
      persistPicks();
      syncPickButtons();
      renderBar();
    }

    function clearPicks() {
      picks = [];
      persistPicks();
      syncPickButtons();
      renderBar();
    }

    function formatPicksForClipboard() {
      const n = picks.length;
      const lines = picks.map(id => {
        const v = venueById.get(id);
        if (!v) return null;
        // Use translated cuisine + hood for the bullet when in zh mode.
        const cuisineStr = tv(v, 'cuisine');
        const hoodStr = tv(v, 'hood');
        const cuisineParens = v._kind === 'dpd' && cuisineStr ? ` (${cuisineStr})` : '';
        // Use Chinese venue name when in zh mode and a zh name exists, else English.
        const displayName = (currentLang === 'zh' && v.zh) ? `${v.name} ${v.zh}` : v.name;
        return `• ${displayName}${cuisineParens} — ${hoodStr} — ${v.maps}`;
      }).filter(Boolean);
      return `${t('clipboardHeader')(n)}\n\n${lines.join('\n')}\n\n${t('clipboardFooter')}`;
    }

    function showPicksFallback(text) {
      const overlay = document.createElement('div');
      overlay.className = 'picks-fallback';
      overlay.innerHTML = `
        <div class="picks-fallback-inner">
          <p class="text-sm text-slate-700 mb-2 font-medium">${escapeHtml(t('fallbackHeader'))}</p>
          <textarea readonly></textarea>
          <div class="mt-3 flex justify-end">
            <button type="button" class="picks-fallback-close bg-slate-800 hover:bg-slate-700 text-white font-semibold text-sm px-4 py-2 rounded-lg">${escapeHtml(t('fallbackClose'))}</button>
          </div>
        </div>`;
      const ta = overlay.querySelector('textarea');
      ta.value = text;
      document.body.appendChild(overlay);
      ta.focus();
      ta.select();
      overlay.addEventListener('click', (e) => {
        if (e.target === overlay || e.target.classList.contains('picks-fallback-close')) {
          document.body.removeChild(overlay);
        }
      });
    }

    async function copyPicks() {
      if (picks.length === 0) {
        showToast(t('toastPickFirst'));
        return;
      }
      const text = formatPicksForClipboard();
      try {
        await navigator.clipboard.writeText(text);
        showToast(t('toastPicksCopied'));
        return;
      } catch {}
      // Fallback: temp textarea + execCommand
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed'; ta.style.left = '-9999px';
      document.body.appendChild(ta);
      ta.select();
      let ok = false;
      try { ok = document.execCommand('copy'); } catch { ok = false; }
      document.body.removeChild(ta);
      if (ok) {
        showToast(t('toastPicksCopied'));
      } else {
        showPicksFallback(text);
      }
    }

    function wirePicks() {
      // Click delegation on body — pick buttons can be inside either main grid or DPD grids.
      document.body.addEventListener('click', (e) => {
        const btn = e.target.closest('button[data-pick]');
        if (!btn) return;
        togglePick(btn.dataset.pick);
      });
      picksCopyBtn.addEventListener('click', copyPicks);
      picksClearBtn.addEventListener('click', clearPicks);
    }

    // ============================================================
    // LANG TOGGLE
    // ============================================================
    function loadLang() {
      try {
        const saved = localStorage.getItem(LANG_KEY);
        if (saved === 'en' || saved === 'zh') currentLang = saved;
      } catch {}
    }

    function persistLang() {
      try { localStorage.setItem(LANG_KEY, currentLang); } catch {}
    }

    function syncLangToggle() {
      document.querySelectorAll('#lang-toggle button[data-lang]').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === currentLang);
      });
    }

    function setLang(lang) {
      if (lang !== 'en' && lang !== 'zh') return;
      if (lang === currentLang) return;
      currentLang = lang;
      persistLang();
      syncLangToggle();
      renderStatic();
      render();
      syncPickButtons();
      renderBar();
      // Re-apply current DPD filter (re-render wipes the .hidden classes).
      applyDpdFilter(currentFilter);
    }

    function wireLangToggle() {
      document.getElementById('lang-toggle').addEventListener('click', (e) => {
        const btn = e.target.closest('button[data-lang]');
        if (!btn) return;
        setLang(btn.dataset.lang);
      });
    }

    // ============================================================
    // BOOT
    // ============================================================
    loadLang();
    syncLangToggle();
    renderStatic();
    loadPicks();
    render();
    wireDpdFilter();
    syncPickButtons();
    renderBar();
    wirePicks();
    wireLangToggle();
  </script>
</body>
</html>
